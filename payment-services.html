<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>قسم الدفع والخدمات المالية | Hamado Card</title><meta name="description" content="قسم خدمات الدفع والتحويل في Hamado Card - صفحة SEO مستقلة."><meta name="robots" content="index,follow"><link rel="canonical" href="https://hamadocard.com/payment-services.html"><style>body{font-family:Cairo,sans-serif;background:#f5f5f5;margin:0}header,footer{background:#2e7d32;color:#fff;padding:12px}main{max-width:900px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}.card{background:#fff;border-radius:12px;padding:12px}.links a{margin-left:8px;color:#fff}</style></head><body><header><strong>💳 قسم الدفع</strong> <span class="links"><a href="/">الرئيسية</a><a href="/games.html">الألعاب</a><a href="/apps.html">التطبيقات</a><a href="/streaming-services.html">الاشتراكات</a></span></header><main><h1>قسم خدمات الدفع</h1><div id="products" class="grid"></div></main><footer>© Hamado Card</footer><script>const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost/wp-json/hamado/v1':location.origin+'/wp-json/hamado/v1';fetch(API_BASE+'/products/by-section/payments').then(r=>r.json()).then(d=>{const list=(d.products||[]);document.getElementById('products').innerHTML=list.map(p=>`<a class="card" href="/"><div>${p.icon||'💳'} ${p.name}</div><b>$${p.price}</b></a>`).join('')||'<div class="card">لا توجد عناصر حالياً</div>';}).catch(()=>document.getElementById('products').innerHTML='<div class="card">تعذر تحميل البيانات</div>');</script></body></html>
